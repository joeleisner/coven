<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Coven Playground</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.colors.min.css"
		>
	</head>
	<body>
		<main class="container">
			<h1>Coven Playground</h1>

			<section>
				<h2>Log</h2>
				<coven-log
					listen="coven-counter:change coven-toggle:change coven-toggle:viewport coven-resize:change"
					cap="10"
				>
					<ol><li>Waiting for events...</li></ol>
				</coven-log>
			</section>

			<section>
				<h2>Components</h2>
				<div class="grid">
					<article>
						<h3>Counter</h3>
						<hr />
						<coven-counter count="0"><output>0</output></coven-counter>
					</article>
					<article>
						<h3>Toggle</h3>
						<hr />
						<coven-toggle>
							<p>This content can be shown or hidden.</p>
						</coven-toggle>
					</article>
					<article>
						<h3>Resize</h3>
						<hr />
						<coven-resize>
							<p>Drag the corner to resize.</p>
						</coven-resize>
					</article>
				</div>
			</section>
		</main>

		<script type="module" src="/src/_playground/index.ts"></script>
	</body>
</html>
